<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; }
canvas { display:block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const p = new URLSearchParams(location.search);

// Text
const MSG   = (p.get('text') || 'HELLO WORLD').toUpperCase();
const COL   = p.get('color') || '#FF0000';
const SPD   = Math.max(1, parseInt(p.get('speed') || '3'));
const DIR   = p.get('direction') || 'left';
const BLINK = p.get('blink') === 'true';

// Text LED color
const CR = parseInt(COL.slice(1,3), 16);
const CG = parseInt(COL.slice(3,5), 16);
const CB = parseInt(COL.slice(5,7), 16);

// Border params (bstyle: off / on / dotted / snake)
const BSTYLE     = p.get('bstyle') || (p.get('border') === 'true' ? 'snake' : 'off');
const BCOLORMODE = p.get('bcolormode') || 'single';
const BCOLOR     = p.get('bcolor') || COL;
const BSHAPE     = p.get('bshape') || 'dot';

// Border color (may differ from text)
const BCR = parseInt(BCOLOR.slice(1,3), 16);
const BCG = parseInt(BCOLOR.slice(3,5), 16);
const BCB = parseInt(BCOLOR.slice(5,7), 16);

const DIM = 0.06;

// 5x7 LED dot-matrix glyphs
const G = {
  ' ':['00000','00000','00000','00000','00000','00000','00000'],
  'A':['01110','10001','10001','11111','10001','10001','10001'],
  'B':['11110','10001','10001','11110','10001','10001','11110'],
  'C':['01110','10000','10000','10000','10000','10000','01110'],
  'D':['11110','10001','10001','10001','10001','10001','11110'],
  'E':['11111','10000','10000','11110','10000','10000','11111'],
  'F':['11111','10000','10000','11110','10000','10000','10000'],
  'G':['01110','10000','10000','10111','10001','10001','01110'],
  'H':['10001','10001','10001','11111','10001','10001','10001'],
  'I':['11111','00100','00100','00100','00100','00100','11111'],
  'J':['01111','00001','00001','00001','00001','10001','01110'],
  'K':['10001','10010','10100','11000','10100','10010','10001'],
  'L':['10000','10000','10000','10000','10000','10000','11111'],
  'M':['10001','11011','10101','10101','10001','10001','10001'],
  'N':['10001','11001','10101','10011','10001','10001','10001'],
  'O':['01110','10001','10001','10001','10001','10001','01110'],
  'P':['11110','10001','10001','11110','10000','10000','10000'],
  'Q':['01110','10001','10001','10001','10101','10010','01101'],
  'R':['11110','10001','10001','11110','10100','10010','10001'],
  'S':['01110','10000','10000','01110','00001','00001','01110'],
  'T':['11111','00100','00100','00100','00100','00100','00100'],
  'U':['10001','10001','10001','10001','10001','10001','01110'],
  'V':['10001','10001','10001','10001','10001','01010','00100'],
  'W':['10001','10001','10001','10101','10101','11011','10001'],
  'X':['10001','10001','01010','00100','01010','10001','10001'],
  'Y':['10001','10001','01010','00100','00100','00100','00100'],
  'Z':['11111','00001','00010','00100','01000','10000','11111'],
  '0':['01110','10001','10011','10101','11001','10001','01110'],
  '1':['00100','01100','00100','00100','00100','00100','01110'],
  '2':['01110','10001','00001','00010','00100','01000','11111'],
  '3':['11111','00001','00010','00110','00001','10001','01110'],
  '4':['00010','00110','01010','10010','11111','00010','00010'],
  '5':['11111','10000','10000','11110','00001','00001','11110'],
  '6':['00110','01000','10000','11110','10001','10001','01110'],
  '7':['11111','00001','00010','00100','01000','01000','01000'],
  '8':['01110','10001','10001','01110','10001','10001','01110'],
  '9':['01110','10001','10001','01111','00001','00010','01100'],
  '!':['00100','00100','00100','00100','00100','00000','00100'],
  '.':['00000','00000','00000','00000','00000','00000','00100'],
  ',':['00000','00000','00000','00000','00110','00100','01000'],
  '?':['01110','10001','00001','00010','00100','00000','00100'],
  ':':['00000','00100','00100','00000','00100','00100','00000'],
  '-':['00000','00000','00000','11111','00000','00000','00000'],
  '/':['00001','00010','00100','00100','01000','10000','10000'],
  '#':['01010','01010','11111','01010','11111','01010','01010'],
  '@':['01110','10001','10111','10101','10111','10000','01110'],
};

const cv  = document.getElementById('c');
const ctx = cv.getContext('2d');

let W, H, EW, EH, portrait;
let DS, GAP, STEP, INNER, CW, CH;
let bgCanvas, textCanvas;
let offset = 0, borderOff = 0;
let borderDots = [];
let blinkOn = true, blinkTick = 0;
let ready = false;

function init() {
  W = cv.width  = window.innerWidth;
  H = cv.height = window.innerHeight;

  portrait = H > W;
  EW = portrait ? H : W;
  EH = portrait ? W : H;

  DS   = Math.max(8, Math.min(50, Math.floor(EH / 18)));
  GAP  = Math.max(2, Math.floor(DS * 0.3));
  STEP = DS + GAP;
  INNER = STEP;
  CW   = 5 * STEP + STEP;
  CH   = 7 * STEP;

  if      (DIR === 'left')  offset = EW;
  else if (DIR === 'right') offset = -(MSG.length * CW);
  else if (DIR === 'up')    offset = EH;
  else                      offset = -(CH);

  buildBg();
  buildText();
  buildBorder();
  ready = true;
}

// --- Background grid -------------------------------------------------------

function buildBg() {
  bgCanvas = document.createElement('canvas');
  bgCanvas.width = EW; bgCanvas.height = EH;
  const bc = bgCanvas.getContext('2d');
  bc.shadowBlur = 0;
  const dr = Math.floor(DS / 2 * 0.7);
  const fc = `rgba(${(CR*DIM)|0},${(CG*DIM)|0},${(CB*DIM)|0},0.5)`;
  for (let y = 0; y < EH; y += STEP) {
    for (let x = 0; x < EW; x += STEP) {
      bc.beginPath();
      bc.arc(x + DS/2, y + DS/2, dr, 0, Math.PI*2);
      bc.fillStyle = fc;
      bc.fill();
    }
  }
}

// --- Text ------------------------------------------------------------------

function buildText() {
  const tw = MSG.length * CW + STEP;
  textCanvas = document.createElement('canvas');
  textCanvas.width  = tw;
  textCanvas.height = CH + DS;
  const tc = textCanvas.getContext('2d');
  const r  = Math.floor(DS / 2 * 0.82);

  for (let ci = 0; ci < MSG.length; ci++) {
    const glyph = G[MSG[ci]] || G[' '];
    const cx = ci * CW;
    for (let row = 0; row < 7; row++) {
      for (let col = 0; col < 5; col++) {
        if (glyph[row][col] !== '1') continue;
        const x = cx + col * STEP + DS/2;
        const y = row  * STEP      + DS/2;
        tc.beginPath();
        tc.arc(x, y, r, 0, Math.PI*2);
        tc.fillStyle   = `rgb(${CR},${CG},${CB})`;
        tc.shadowColor = `rgba(${CR},${CG},${CB},0.9)`;
        tc.shadowBlur  = DS * 1.4;
        tc.fill();
      }
    }
  }
}

// --- Border ----------------------------------------------------------------

function buildBorder() {
  borderDots = [];
  // Always build even if style is 'off' so a live switch wouldn't break things
  for (let x = 0;              x <= EW - DS;      x += STEP) borderDots.push([x,      0     ]);
  for (let y = STEP;           y <= EH - DS;      y += STEP) borderDots.push([EW-DS,  y     ]);
  for (let x = EW - DS - STEP; x >= 0;            x -= STEP) borderDots.push([x,      EH-DS ]);
  for (let y = EH - DS - STEP; y >= STEP;         y -= STEP) borderDots.push([0,      y     ]);
}

// HSL → RGB helper for rainbow mode
function hslToRgb(h, s, l) {
  const c = (1 - Math.abs(2*l - 1)) * s;
  const x = c * (1 - Math.abs((h / 60) % 2 - 1));
  const m = l - c / 2;
  let r = 0, g = 0, b = 0;
  if      (h < 60)  { r = c; g = x; }
  else if (h < 120) { r = x; g = c; }
  else if (h < 180) { g = c; b = x; }
  else if (h < 240) { g = x; b = c; }
  else if (h < 300) { r = x; b = c; }
  else              { r = c; b = x; }
  return [(r + m) * 255 | 0, (g + m) * 255 | 0, (b + m) * 255 | 0];
}

// Draw one border element (dot / star / square) centered at (cx, cy)
function drawBorderShape(cx, cy, r) {
  if (BSHAPE === 'square') {
    ctx.beginPath();
    ctx.rect(cx - r, cy - r, r * 2, r * 2);
    ctx.fill();
  } else if (BSHAPE === 'star') {
    const inner = r * 0.38;
    ctx.beginPath();
    for (let i = 0; i < 10; i++) {
      const ang = (i * Math.PI / 5) - Math.PI / 2;
      const rad = i % 2 === 0 ? r : inner;
      const px = cx + Math.cos(ang) * rad;
      const py = cy + Math.sin(ang) * rad;
      i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fill();
  } else {                    // dot (default)
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawBorder() {
  if (BSTYLE === 'off' || borderDots.length === 0) return;

  const total    = borderDots.length;
  const bo       = Math.floor(borderOff);
  const r        = DS / 2 * 0.82;
  const litCount = Math.max(3, Math.floor(total * 0.15)); // used by snake

  for (let i = 0; i < total; i++) {
    const [x, y] = borderDots[i];
    const cx = x + DS / 2, cy = y + DS / 2;

    // --- Is this dot lit? ---
    let on;
    if (BSTYLE === 'on') {
      on = true;
    } else if (BSTYLE === 'dotted') {
      // Alternating dash pattern (2 lit, 1 gap) that chases around
      const pos = (i - bo + total) % total;
      on = (pos % 3) !== 2;
    } else {                  // snake — two snakes from opposite corners
      const half = Math.floor(total / 2);
      const pos1 = (i - bo + total) % total;
      const pos2 = (i - bo - half + total) % total;
      on = pos1 < litCount || pos2 < litCount;
    }

    // --- Color ---
    let dr, dg, db;
    if (BCOLORMODE === 'rainbow') {
      // Hue based on position + slow rotation via borderOff
      const hue = ((i / total) * 360 + borderOff * 1.5) % 360;
      [dr, dg, db] = hslToRgb(hue, 1.0, 0.5);
    } else {
      dr = BCR; dg = BCG; db = BCB;
    }

    // --- Draw ---
    if (on) {
      ctx.fillStyle   = `rgb(${dr},${dg},${db})`;
      ctx.shadowColor = `rgba(${dr},${dg},${db},0.85)`;
      ctx.shadowBlur  = DS;
    } else {
      ctx.fillStyle   = `rgba(${(dr*DIM)|0},${(dg*DIM)|0},${(db*DIM)|0},0.45)`;
      ctx.shadowColor = 'transparent';
      ctx.shadowBlur  = 0;
    }
    drawBorderShape(cx, cy, r);
  }
}

// --- Main loop -------------------------------------------------------------

function loop() {
  requestAnimationFrame(loop);
  if (!ready) return;

  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  ctx.save();
  if (portrait) {
    ctx.translate(0, H);
    ctx.rotate(-Math.PI / 2);
  }

  ctx.drawImage(bgCanvas, 0, 0);

  blinkTick++;
  if (BLINK && blinkTick >= 36) { blinkOn = !blinkOn; blinkTick = 0; }

  const tw     = MSG.length * CW;
  const innerW = EW - 2 * INNER;
  const innerH = EH - 2 * INNER;
  let tx = 0, ty = 0;

  if (DIR === 'left') {
    tx = offset; ty = INNER + (innerH - CH) / 2;
    offset -= SPD;
    if (offset < -tw) offset = EW;
  } else if (DIR === 'right') {
    tx = offset; ty = INNER + (innerH - CH) / 2;
    offset += SPD;
    if (offset > EW) offset = -tw;
  } else if (DIR === 'up') {
    tx = INNER + (innerW - tw) / 2; ty = offset;
    offset -= SPD;
    if (offset < -CH) offset = EH;
  } else {
    tx = INNER + (innerW - tw) / 2; ty = offset;
    offset += SPD;
    if (offset > EH) offset = -CH;
  }

  if (!BLINK || blinkOn) {
    ctx.save();
    ctx.beginPath();
    ctx.rect(INNER, INNER, innerW, innerH);
    ctx.clip();
    ctx.shadowBlur = 0;
    ctx.drawImage(textCanvas, tx, ty);
    ctx.restore();
  }

  // Advance border animation counter
  // 'on'+'single': no movement needed, but still advance for rainbow rotation
  // 'dotted' and 'snake': advance for chase effect
  borderOff = (borderOff + 0.45) % Math.max(1, borderDots.length);

  drawBorder();

  ctx.restore();
}

window.addEventListener('resize', init);
init();
loop();
</script>
</body>
</html>
