<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; background:#000; }
    #poster {
      position:fixed;
      /* size, offset and rotation set by JS */
    }
    #poster img {
      width:100%;
      height:100%;
      object-fit:fill;
      display:block;
    }
  </style>
</head>
<body>
  <div id="poster">
    <img id="gif" src="" alt=""/>
  </div>
  <script>
    const p   = new URLSearchParams(location.search);
    const gif = p.get('gif') || 'evil-eye-1.gif';
    document.getElementById('gif').src = 'evil-eyes/' + gif;

    function layout() {
      const SW = window.innerWidth;
      const SH = window.innerHeight;
      const poster = document.getElementById('poster');
      if (SH > SW) {
        poster.style.width           = SH + 'px';
        poster.style.height          = SW + 'px';
        poster.style.left            = ((SW - SH) / 2) + 'px';
        poster.style.top             = ((SH - SW) / 2) + 'px';
        poster.style.transformOrigin = 'center center';
        poster.style.transform       = 'rotate(90deg)';
      } else {
        poster.style.width     = SW + 'px';
        poster.style.height    = SH + 'px';
        poster.style.left      = '0';
        poster.style.top       = '0';
        poster.style.transform = 'none';
      }
    }

    layout();
    window.addEventListener('resize', layout);
  </script>
</body>
</html>
